<main>
<!-- SIDEBAR FILTER -->
<aside class="sidebar">
    <h2>Filter by Game</h2>
    <button class="filter-btn active" data-game="all">All</button>
    <button class="filter-btn" data-game="elden-ring">Elden Ring</button>
    <button class="filter-btn" data-game="dark-souls-3">Dark Souls 3</button>
    <button class="filter-btn" data-game="lies-of-p">Lies of P</button>

    <h2>Search News</h2>
    <input type="text" id="news-search" placeholder="Search...">
</aside>

<!-- NEWS COLUMNS -->
<section class="news-columns">
    <!-- PATCH NOTES -->
    <div class="column">
        <h2>Patch Notes</h2>
        <div class="card" data-game="elden-ring">
            <p>Update coming soon...</p>
        </div>
        <div class="card" data-game="dark-souls-3">
            <p>Balance changes incoming...</p>
        </div>
    </div>

    <!-- DLC -->
    <div class="column">
        <h2>DLC News</h2>
        <div class="card" data-game="lies-of-p">
            <p>DLC announced...</p>
        </div>
    </div>

    <!-- ISSUES -->
    <div class="column">
        <h2>Known Issues</h2>
        <div class="card" data-game="elden-ring">
            <p>Bug found in multiplayer...</p>
        </div>
    </div>

    <!-- BREAKING -->
    <div class="column">
        <h2>Breaking News</h2>
        <div class="card" data-game="elden-ring">
            <p>Big update coming!</p>
        </div>
    </div>
</section>
